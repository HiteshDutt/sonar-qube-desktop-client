name: Sonar Read and Export to Blob

on:
    workflow_dispatch:
        inputs:
            branch:
                description: 'Sonar branch to read from'
                required: true
                default: 'main'
            languages:
                description: 'Comma-separated languages to scan (e.g. cs,ts)'
                required: true
                default: 'cs'
            issueStatuses:
                description: 'Issue statuses to fetch (e.g. OPEN)'
                required: false
                default: 'OPEN'
            outputDirectory:
                description: 'Local output directory for generated files'
                required: false
                default: './output'
            pageSize:
                description: 'Page size for Sonar API calls'
                required: false
                default: '500'
            parallelReadCalls:
                description: 'Number of parallel read calls'
                required: false
                default: '100'
            requireParallelRuleRead:
                description: 'Use parallel rule reading'
                required: false
                type: boolean
                default: false
    schedule:
        # Runs every day at midnight UTC — uses input defaults defined above
        - cron: '0 0 * * *'

permissions:
    id-token: write   # Required for OIDC / Federated Credentials
    contents: read

jobs:
    sonar-read:
        runs-on: ubuntu-latest

        env:
            SONAR_BASE_URL: ${{ secrets.SONAR_BASE_URL }}
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
            SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Login to Azure (Federated / OIDC)
              uses: azure/login@v2
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install Dependencies
              run: npm ci

            - name: Run Sonar Read
              run: |
                  npx ts-node ./src/index.read.ts \
                    --branch="${{ inputs.branch || 'main' }}" \
                    --languages="${{ inputs.languages || 'cs' }}" \
                    --issueStatuses="${{ inputs.issueStatuses || 'OPEN' }}" \
                    --outputDirectory="${{ inputs.outputDirectory || './output' }}" \
                    --pageSize="${{ inputs.pageSize || '500' }}" \
                    --parallelReadCalls="${{ inputs.parallelReadCalls || '100' }}" \
                    ${{ (inputs.requireParallelRuleRead == true || inputs.requireParallelRuleRead == 'true') && '--requireParallelRuleRead' || '' }}

            - name: Upload Output to Azure Blob Storage
              run: |
                  az storage blob upload-batch \
                    --account-name ${{ secrets.AZ_STORAGE_ACCOUNT_NAME }} \
                    --destination ${{ secrets.AZ_STORAGE_CONTAINER_NAME }} \
                    --source ${{ inputs.outputDirectory || './output' }} \
                    --overwrite true \
                    --auth-mode login
